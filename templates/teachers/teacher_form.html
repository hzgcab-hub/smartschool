<!DOCTYPE html>
<html>
<head>
    <title>{{ title }} - SmartSchool</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 3px solid #3498db;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        h1 i {
            color: #3498db;
            font-size: 2rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #34495e;
            font-weight: 600;
            font-size: 0.95rem;
        }
        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="number"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 5px 15px rgba(52,152,219,0.2);
        }
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .errorlist {
            color: #e74c3c;
            list-style: none;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }
        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #ecf0f1;
        }
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: #27ae60;
            color: white;
        }
        .btn-primary:hover {
            background: #229954;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(39,174,96,0.3);
        }
        .btn-secondary {
            background: #95a5a6;
            color: white;
        }
        .btn-secondary:hover {
            background: #7f8c8d;
            transform: translateY(-2px);
        }
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        .help-text {
            color: #7f8c8d;
            font-size: 0.85rem;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <i class="fas fa-chalkboard-teacher"></i>
            {{ title|default:"Add New Teacher" }}
        </h1>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            {% if form.non_field_errors %}
            <div style="background: #fee; color: #c33; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                {{ form.non_field_errors }}
            </div>
            {% endif %}

            <!-- Personal Information -->
            <h3 style="color: #2c3e50; margin: 20px 0 15px;">Personal Information</h3>
            <div class="row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" name="first_name" required placeholder="Enter first name">
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" name="last_name" required placeholder="Enter last name">
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required placeholder="teacher@school.com">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" name="phone" placeholder="+251 911 234 567">
                </div>
            </div>

            <!-- Account Information -->
            <h3 style="color: #2c3e50; margin: 20px 0 15px;">Account Information</h3>
            <div class="row">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required placeholder="Choose username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required placeholder="Enter password">
                </div>
            </div>

            <!-- Professional Information -->
            <h3 style="color: #2c3e50; margin: 20px 0 15px;">Professional Information</h3>
            <div class="row">
                <div class="form-group">
                    <label>Employee ID</label>
                    <input type="text" name="employee_id" required placeholder="TCH001">
                </div>
                <div class="form-group">
                    <label>Joining Date</label>
                    <input type="date" name="joining_date" required>
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Qualification</label>
                    <input type="text" name="qualification" required placeholder="e.g., M.Sc in Mathematics">
                </div>
                <div class="form-group">
                    <label>Specialization</label>
                    <input type="text" name="specialization" required placeholder="e.g., Mathematics">
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Employment Type</label>
                    <select name="employment_type">
                        <option value="permanent">Permanent</option>
                        <option value="contract">Contract</option>
                        <option value="visiting">Visiting</option>
                        <option value="probation">Probation</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Experience (Years)</label>
                    <input type="number" name="experience_years" value="0" min="0">
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Gender</label>
                    <select name="gender">
                        <option value="M">Male</option>
                        <option value="F">Female</option>
                        <option value="O">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Blood Group</label>
                    <input type="text" name="blood_group" placeholder="e.g., O+">
                </div>
            </div>

            <!-- Emergency Contact -->
            <h3 style="color: #2c3e50; margin: 20px 0 15px;">Emergency Contact</h3>
            <div class="row">
                <div class="form-group">
                    <label>Emergency Contact Name</label>
                    <input type="text" name="emergency_contact_name" required>
                </div>
                <div class="form-group">
                    <label>Emergency Contact Phone</label>
                    <input type="text" name="emergency_contact" required>
                </div>
            </div>

            <!-- Bank Details (Optional) -->
            <h3 style="color: #2c3e50; margin: 20px 0 15px;">Bank Details (Optional)</h3>
            <div class="row">
                <div class="form-group">
                    <label>Bank Name</label>
                    <input type="text" name="bank_name">
                </div>
                <div class="form-group">
                    <label>Account Number</label>
                    <input type="text" name="bank_account_no">
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>IFSC Code</label>
                    <input type="text" name="ifsc_code">
                </div>
                <div class="form-group">
                    <label>PAN Card</label>
                    <input type="text" name="pan_card">
                </div>
            </div>

            <div class="form-group">
                <label>Salary (ETB)</label>
                <input type="number" name="salary" step="0.01" placeholder="Enter monthly salary">
            </div>

            <div class="form-group">
                <label>Subjects (comma separated)</label>
                <input type="text" name="subjects" placeholder="e.g., Mathematics, Physics, Chemistry">
            </div>

            <div class="form-group">
                <label>Address</label>
                <textarea name="address" rows="3" placeholder="Enter full address"></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Save Teacher
                </button>
                <a href="{% url 'teacher_list' %}" class="btn btn-secondary">
                    <i class="fas fa-times"></i> Cancel
                </a>
            </div>
        </form>
    </div>
</body>
</html>
