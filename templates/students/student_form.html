<!DOCTYPE html>
<html>
<head>
    <title>{{ title }} - SmartSchool</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 3px solid #27ae60;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        h1 i {
            color: #27ae60;
            font-size: 2rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #34495e;
            font-weight: 600;
            font-size: 0.95rem;
        }
        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="number"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #27ae60;
            box-shadow: 0 5px 15px rgba(39,174,96,0.2);
        }
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #ecf0f1;
        }
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: #27ae60;
            color: white;
        }
        .btn-primary:hover {
            background: #229954;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(39,174,96,0.3);
        }
        .btn-secondary {
            background: #95a5a6;
            color: white;
        }
        .btn-secondary:hover {
            background: #7f8c8d;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <i class="fas fa-user-graduate"></i>
            {{ title|default:"Add New Student" }}
        </h1>

        <form method="POST">
            {% csrf_token %}
            
            <div class="row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" name="first_name" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" name="last_name" required>
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Admission Number</label>
                    <input type="text" name="admission_number" required>
                </div>
                <div class="form-group">
                    <label>Roll Number</label>
                    <input type="text" name="roll_number" required>
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Class</label>
                    <input type="text" name="current_class" required placeholder="e.g., 9">
                </div>
                <div class="form-group">
                    <label>Section</label>
                    <input type="text" name="section" required placeholder="e.g., A">
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Gender</label>
                    <select name="gender">
                        <option value="M">Male</option>
                        <option value="F">Female</option>
                        <option value="O">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Blood Group</label>
                    <input type="text" name="blood_group">
                </div>
            </div>

            <h3 style="color: #2c3e50; margin: 20px 0 15px;">Father's Information</h3>
            <div class="row">
                <div class="form-group">
                    <label>Father's Name</label>
                    <input type="text" name="father_name" required>
                </div>
                <div class="form-group">
                    <label>Father's Phone</label>
                    <input type="text" name="father_phone" required>
                </div>
            </div>

            <h3 style="color: #2c3e50; margin: 20px 0 15px;">Mother's Information</h3>
            <div class="row">
                <div class="form-group">
                    <label>Mother's Name</label>
                    <input type="text" name="mother_name" required>
                </div>
                <div class="form-group">
                    <label>Mother's Phone</label>
                    <input type="text" name="mother_phone" required>
                </div>
            </div>

            <div class="form-group">
                <label>Address</label>
                <textarea name="present_address" rows="3" required></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Save Student
                </button>
                <a href="{% url 'student_list' %}" class="btn btn-secondary">
                    <i class="fas fa-times"></i> Cancel
                </a>
            </div>
        </form>
    </div>
</body>
</html>
